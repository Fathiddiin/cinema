<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchTogether</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d14; color: #e8e8f0; }

/* LOBBY */
#lobby {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 20px; gap: 24px;
}
.logo { font-size: 32px; font-weight: 600; letter-spacing: -1px; }
.logo span { color: #7c6af0; }
.logo-sub { font-size: 14px; color: #555; text-align: center; margin-top: 6px; }
.card {
  background: #17171f; border: 1px solid #2a2a38; border-radius: 16px;
  padding: 28px; width: 100%; max-width: 380px;
}
.card h3 { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 12px; }
.inp {
  width: 100%; background: #0d0d14; border: 1px solid #2a2a38; border-radius: 10px;
  padding: 11px 14px; color: #e8e8f0; font-size: 14px; outline: none; margin-bottom: 10px;
  transition: border-color 0.15s;
}
.inp:focus { border-color: #7c6af0; }
.btn {
  width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #7c6af0; color: #fff; }
.btn-secondary { background: #1e1e2a; color: #9090a8; border: 1px solid #2a2a38; margin-top: 8px; }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.divider-line { flex: 1; height: 1px; background: #2a2a38; }
.divider span { font-size: 12px; color: #444; }
.error-msg { font-size: 13px; color: #e05555; margin-top: 8px; display: none; padding: 8px 12px;
  background: rgba(224,85,85,0.1); border-radius: 8px; }

/* ROOM */
#room { display: none; height: 100vh; flex-direction: column; }

.top-bar {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  background: #13131c; border-bottom: 1px solid #2a2a38; flex-shrink: 0;
}
.logo-sm { font-size: 16px; font-weight: 600; }
.logo-sm span { color: #7c6af0; }
.users-wrap { display: flex; align-items: center; gap: 8px; margin-left: 12px; }
.avatar {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 600;
}
.av-me { background: #3a2f7a; color: #b8aff5; }
.av-partner { background: #1a3a2f; color: #5fcca8; }
.av-waiting { background: #1a1a2a; color: #444; border: 1px dashed #333; }
.partner-status { font-size: 12px; color: #555; }
.partner-status.online { color: #5fcca8; }
.room-badge {
  margin-left: auto; font-size: 11px; background: #1e1e2e; border: 1px solid #2a2a38;
  color: #7c6af0; padding: 4px 12px; border-radius: 20px; cursor: pointer;
  user-select: all; letter-spacing: 1px; font-weight: 600;
}
.room-badge:hover { border-color: #7c6af0; }
.copy-hint { font-size: 10px; color: #444; margin-left: 6px; }

.main-area { display: flex; flex: 1; overflow: hidden; }

/* VIDEO */
.video-side { flex: 1; display: flex; flex-direction: column; background: #07070e; min-width: 0; }
.video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
#mainVideo { width: 100%; height: 100%; object-fit: contain; display: none; }
.video-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 14px; color: #333;
}
.play-big {
  width: 72px; height: 72px; border-radius: 50%; background: #1a1a28;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  border: 1px solid #2a2a3a; transition: all 0.2s;
}
.play-big:hover { background: #2a2a40; border-color: #7c6af0; transform: scale(1.05); }
.play-big svg { margin-left: 4px; }
.ph-text { font-size: 13px; color: #444; }

.sync-badge {
  position: absolute; top: 12px; right: 12px; font-size: 11px;
  background: rgba(124,106,240,0.9); color: #fff;
  padding: 4px 10px; border-radius: 20px; display: none; font-weight: 500;
}

.controls {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: #11111a; border-top: 1px solid #1e1e2a; flex-shrink: 0;
}
.ctrl-btn {
  background: none; border: none; color: #666; cursor: pointer; padding: 7px;
  border-radius: 8px; display: flex; align-items: center; transition: all 0.15s;
}
.ctrl-btn:hover { color: #e8e8f0; background: #1e1e2a; }
.ctrl-btn svg { width: 18px; height: 18px; }
.progress-wrap {
  flex: 1; height: 4px; background: #1e1e2a; border-radius: 4px; cursor: pointer; position: relative;
}
.progress-fill { height: 100%; background: #7c6af0; border-radius: 4px; width: 0%; pointer-events: none; }
.time-lbl { font-size: 11px; color: #555; min-width: 80px; text-align: right; }
.vol-wrap { display: flex; align-items: center; gap: 6px; }
.vol-slider { width: 64px; accent-color: #7c6af0; cursor: pointer; }

.upload-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  background: #0d0d16; border-top: 1px solid #1a1a24; flex-shrink: 0;
}
.upload-lbl {
  flex: 1; font-size: 12px; color: #444; cursor: pointer; padding: 7px 12px;
  border: 1px dashed #2a2a3a; border-radius: 8px; text-align: center;
  transition: all 0.15s;
}
.upload-lbl:hover { border-color: #7c6af0; color: #9090a8; }
#fileInput { display: none; }

/* CHAT */
.chat-side {
  width: 260px; display: flex; flex-direction: column;
  border-left: 1px solid #1e1e2a; background: #0f0f18; flex-shrink: 0;
}
.chat-header {
  padding: 12px 14px; border-bottom: 1px solid #1e1e2a;
  font-size: 12px; color: #555; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 10px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }
.msg { display: flex; flex-direction: column; gap: 3px; }
.msg-name { font-size: 10px; font-weight: 600; }
.msg-name.me { color: #9985f5; }
.msg-name.other { color: #5fcca8; }
.msg-text { font-size: 13px; color: #ccc; line-height: 1.45; word-break: break-word; }
.msg-text.sys { color: #444; font-style: italic; font-size: 11px; }
.chat-foot {
  display: flex; gap: 6px; padding: 10px; border-top: 1px solid #1e1e2a; flex-shrink: 0;
}
.chat-inp {
  flex: 1; background: #17172a; border: 1px solid #2a2a3a; border-radius: 8px;
  padding: 8px 11px; color: #e8e8f0; font-size: 13px; outline: none;
  resize: none; font-family: inherit; line-height: 1.4;
  transition: border-color 0.15s;
}
.chat-inp:focus { border-color: #7c6af0; }
.send-btn {
  background: #7c6af0; border: none; border-radius: 8px; padding: 8px 12px;
  color: #fff; cursor: pointer; font-size: 16px; transition: opacity 0.15s; flex-shrink: 0;
}
.send-btn:hover { opacity: 0.85; }

@media (max-width: 600px) {
  .chat-side { width: 100%; max-height: 200px; border-left: none; border-top: 1px solid #1e1e2a; }
  .main-area { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div>
    <div class="logo"><span>●</span> WatchTogether</div>
    <div class="logo-sub">Faqat ikki kishi. Bitta kino. Birgalikda.</div>
  </div>

  <div class="card">
    <h3>Ismingiz</h3>
    <input class="inp" id="nameInput" placeholder="Masalan: Jasur" maxlength="20" />

    <h3 style="margin-top:18px">Yangi xona yaratish</h3>
    <input class="inp" id="newCodeInput" placeholder="Xona kodi (o'zingiz o'ylab toping)" maxlength="12" style="text-transform:uppercase" />
    <button class="btn btn-primary" onclick="createRoom()">Xona yaratish →</button>

    <div class="divider"><div class="divider-line"></div><span>yoki</span><div class="divider-line"></div></div>

    <h3>Mavjud xonaga kirish</h3>
    <input class="inp" id="joinCodeInput" placeholder="Xona kodi" maxlength="12" style="text-transform:uppercase" />
    <button class="btn btn-secondary" onclick="joinRoom()">Xonaga kirish</button>

    <div class="error-msg" id="errMsg"></div>
  </div>
</div>

<!-- ROOM -->
<div id="room">
  <div class="top-bar">
    <div class="logo-sm"><span>●</span> WT</div>
    <div class="users-wrap">
      <div class="avatar av-me" id="myAvatar">?</div>
      <div class="avatar av-waiting" id="partnerAvatar" title="Sherik kutilmoqda">?</div>
    </div>
    <span class="partner-status" id="partnerStatus">Sherik kutilmoqda...</span>
    <div style="margin-left:auto; display:flex; align-items:center; gap:6px;">
      <span class="copy-hint" id="copyHint"></span>
      <div class="room-badge" id="roomBadge" onclick="copyCode()" title="Kodni nusxalash uchun bosing">—</div>
    </div>
  </div>

  <div class="main-area">
    <div class="video-side">
      <div class="video-wrap" id="videoWrap">
        <video id="mainVideo"></video>
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="play-big" onclick="document.querySelector('.upload-lbl').click()">
            <svg viewBox="0 0 24 24" fill="#7c6af0" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <span class="ph-text">Kino faylini yuklash uchun bosing</span>
        </div>
        <div class="sync-badge" id="syncBadge">↔ Sync</div>
      </div>

      <div class="controls" id="videoControls">
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-wrap" id="progressWrap" onclick="seekVideo(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-lbl" id="timeLbl">0:00 / 0:00</span>
        <div class="vol-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#666"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)" />
        </div>
      </div>

      <div class="upload-bar">
        <input type="file" id="fileInput" accept="video/*" onchange="loadVideo(this)">
        <label for="fileInput" class="upload-lbl" id="uploadLbl">
          ↑ Kino faylini yuklang (MP4, MKV, AVI...)
        </label>
      </div>
    </div>

    <div class="chat-side">
      <div class="chat-header">
        💬 Chat
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-foot">
        <textarea class="chat-inp" id="chatInp" placeholder="Xabar yozing..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button class="send-btn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
let myName = '', myCode = '', isHost = false, partnerName = '';
let isSyncing = false;

// --- LOBBY ---
function getRandCode() {
  const w = ['FILM','KINO','STAR','PLAY','VIEW','SHOW','NITE'];
  return w[Math.floor(Math.random()*w.length)] + '-' + Math.floor(1000+Math.random()*9000);
}

document.getElementById('newCodeInput').value = getRandCode();
['newCodeInput','joinCodeInput'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9\-]/g,'');
  });
});

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function createRoom() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('newCodeInput').value.trim().toUpperCase();
  if (!name) return document.getElementById('nameInput').focus();
  if (!code) return document.getElementById('newCodeInput').focus();
  myName = name; isHost = true;
  socket.emit('create_room', { name, code });
}

function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if (!name) return document.getElementById('nameInput').focus();
  if (!code) return document.getElementById('joinCodeInput').focus();
  myName = name; isHost = false;
  socket.emit('join_room', { name, code });
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') createRoom();
});

// --- SOCKET EVENTS ---
socket.on('room_joined', (d) => {
  myCode = d.code;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';
  document.getElementById('roomBadge').textContent = d.code;
  const init = myName[0].toUpperCase();
  document.getElementById('myAvatar').textContent = init;
  sysMsg(`Xonaga kirdingiz. Kodni sherikingizga yuboring: ${d.code}`);
});

socket.on('partner_joined', (d) => {
  partnerName = d.name;
  const init = d.name[0].toUpperCase();
  const av = document.getElementById('partnerAvatar');
  av.textContent = init;
  av.className = 'avatar av-partner';
  const st = document.getElementById('partnerStatus');
  st.textContent = d.name + ' ulandi ✓';
  st.className = 'partner-status online';
  sysMsg(d.name + ' xonaga kirdi — tomosha boshlashingiz mumkin!');
});

socket.on('partner_left', (d) => {
  partnerName = '';
  const av = document.getElementById('partnerAvatar');
  av.textContent = '?';
  av.className = 'avatar av-waiting';
  const st = document.getElementById('partnerStatus');
  st.textContent = 'Sherik chiqib ketdi...';
  st.className = 'partner-status';
  sysMsg(d.name + ' xonadan chiqdi');
});

socket.on('chat_msg', (d) => addChat(d.name, d.text, 'other'));

socket.on('video_action', (d) => {
  const vid = document.getElementById('mainVideo');
  if (!vid.src) return;
  isSyncing = true;
  if (d.action === 'play') {
    if (Math.abs(vid.currentTime - d.time) > 1) vid.currentTime = d.time;
    vid.play().catch(()=>{});
    sysMsg(partnerName + ' play bosdi');
  } else if (d.action === 'pause') {
    if (Math.abs(vid.currentTime - d.time) > 1) vid.currentTime = d.time;
    vid.pause();
    sysMsg(partnerName + ' pauza qildi');
  } else if (d.action === 'seek') {
    vid.currentTime = d.time;
  }
  showSync();
  setTimeout(() => isSyncing = false, 300);
});

socket.on('error', (d) => showErr(d.msg));

// --- VIDEO ---
function loadVideo(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const vid = document.getElementById('mainVideo');
  vid.src = url;
  vid.style.display = 'block';
  document.getElementById('videoPlaceholder').style.display = 'none';
  document.getElementById('uploadLbl').textContent = '✓ ' + file.name;
  sysMsg('"' + file.name + '" yuklandi');

  vid.addEventListener('play', () => {
    updatePlayBtn(true);
    if (!isSyncing) {
      socket.emit('video_action', { code: myCode, action: 'play', time: vid.currentTime });
      showSync();
    }
  });
  vid.addEventListener('pause', () => {
    updatePlayBtn(false);
    if (!isSyncing) {
      socket.emit('video_action', { code: myCode, action: 'pause', time: vid.currentTime });
      showSync();
    }
  });
  vid.addEventListener('seeked', () => {
    if (!isSyncing) {
      socket.emit('video_action', { code: myCode, action: 'seek', time: vid.currentTime });
      showSync();
    }
  });
  vid.addEventListener('timeupdate', updateProgress);
}

function togglePlay() {
  const vid = document.getElementById('mainVideo');
  if (!vid.src) return;
  vid.paused ? vid.play() : vid.pause();
}

function updatePlayBtn(playing) {
  document.getElementById('playBtn').innerHTML = playing
    ? '<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M8 5v14l11-7z"/></svg>';
}

function updateProgress() {
  const vid = document.getElementById('mainVideo');
  if (!vid.duration) return;
  const pct = (vid.currentTime / vid.duration * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeLbl').textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
}

function seekVideo(e) {
  const vid = document.getElementById('mainVideo');
  if (!vid.src || !vid.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  vid.currentTime = pct * vid.duration;
}

function setVolume(v) {
  document.getElementById('mainVideo').volume = v;
}

function fmt(s) {
  s = Math.floor(s);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function showSync() {
  const b = document.getElementById('syncBadge');
  b.style.display = 'block';
  clearTimeout(b._t);
  b._t = setTimeout(() => b.style.display = 'none', 1200);
}

// --- CHAT ---
function sendChat() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if (!text || !myCode) return;
  inp.value = '';
  addChat(myName, text, 'me');
  socket.emit('chat_msg', { code: myCode, name: myName, text });
}

function addChat(name, text, role) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<span class="msg-name ${role}">${name}</span><span class="msg-text">${escHtml(text)}</span>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sysMsg(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<span class="msg-text sys">${text}</span>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode() {
  navigator.clipboard.writeText(myCode).then(() => {
    document.getElementById('copyHint').textContent = 'Nusxalandi!';
    setTimeout(() => document.getElementById('copyHint').textContent = '', 2000);
  });
}
</script>
</body>
</html>
